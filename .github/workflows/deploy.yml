# deploy.yml
#
# Builds the Expo web export and deploys it to GitHub Pages.
# Triggers on every push to master made by the repo owner,
# or manually via workflow_dispatch.
#
# Required repository secrets:
#   FIREBASE_API_KEY, FIREBASE_AUTH_DOMAIN, FIREBASE_PROJECT_ID,
#   FIREBASE_STORAGE_BUCKET, FIREBASE_MESSAGING_SENDER_ID,
#   FIREBASE_APP_ID, FIREBASE_MEASUREMENT_ID, EXPO_WEB_CLIENT_ID
#
# Required repository setting: Pages source must be set to "GitHub Actions".

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
    # Skip deploy if only docs or config files changed
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'docs/**'
      - 'android/**'
      - 'ios/**'
  # Allows triggering the workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Only allow the repository owner to trigger a deploy
    if: github.actor == 'SRE-0'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # Caches node_modules based on package-lock.json hash
      # so subsequent runs skip re-downloading unchanged packages
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      # Verifies critical secrets are present before attempting the build.
      # Prints length only — never the actual value.
      - name: Verify required secrets are present
        run: |
          FAILED=0

          if [ -z "$EXPO_PUBLIC_FIREBASE_API_KEY" ]; then
            echo "ERROR: FIREBASE_API_KEY secret is missing or empty."
            FAILED=1
          else
            echo "FIREBASE_API_KEY is set (length: ${#EXPO_PUBLIC_FIREBASE_API_KEY})"
          fi

          if [ -z "$EXPO_PUBLIC_EXPO_WEB_CLIENT_ID" ]; then
            echo "ERROR: EXPO_WEB_CLIENT_ID secret is missing or empty."
            FAILED=1
          else
            echo "EXPO_WEB_CLIENT_ID is set (length: ${#EXPO_PUBLIC_EXPO_WEB_CLIENT_ID})"
          fi

          if [ -z "$EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN" ]; then
            echo "ERROR: FIREBASE_AUTH_DOMAIN secret is missing or empty."
            FAILED=1
          else
            echo "FIREBASE_AUTH_DOMAIN is set (length: ${#EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN})"
          fi

          # Exit with error if any secret failed validation
          if [ "$FAILED" -eq 1 ]; then
            echo "One or more required secrets are missing. Aborting deploy."
            exit 1
          fi

          echo "All required secrets are present. Proceeding with build."
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_EXPO_WEB_CLIENT_ID: ${{ secrets.EXPO_WEB_CLIENT_ID }}

      - name: Export Expo web build
        run: npx expo export --platform web
        env:
          NODE_ENV: production
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          EXPO_PUBLIC_EXPO_WEB_CLIENT_ID: ${{ secrets.EXPO_WEB_CLIENT_ID }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4