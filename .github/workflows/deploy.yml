# deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Debug step: verifies that secrets are not empty before building.
      # Shows only whether the value is present, never the actual value.
      - name: Verify required secrets are present
        run: |
          if [ -z "$EXPO_PUBLIC_EXPO_WEB_CLIENT_ID" ]; then
            echo "ERROR: EXPO_PUBLIC_EXPO_WEB_CLIENT_ID is empty. Check the secret name in GitHub Settings."
            exit 1
          else
            echo "EXPO_PUBLIC_EXPO_WEB_CLIENT_ID is set (length: ${#EXPO_PUBLIC_EXPO_WEB_CLIENT_ID})"
          fi
          if [ -z "$EXPO_PUBLIC_FIREBASE_API_KEY" ]; then
            echo "ERROR: EXPO_PUBLIC_FIREBASE_API_KEY is empty."
            exit 1
          else
            echo "EXPO_PUBLIC_FIREBASE_API_KEY is set (length: ${#EXPO_PUBLIC_FIREBASE_API_KEY})"
          fi
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          EXPO_PUBLIC_EXPO_WEB_CLIENT_ID: ${{ secrets.EXPO_WEB_CLIENT_ID }}

      - name: Export Expo web build
        run: npx expo export --platform web
        env:
          NODE_ENV: production
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          EXPO_PUBLIC_EXPO_WEB_CLIENT_ID: ${{ secrets.EXPO_WEB_CLIENT_ID }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4